# PostgreSQL. Versions 9.5 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: cookery_notes_development
  host: localhost
  username: cookery
  password: cookery

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: cookery_notes_test
  host: localhost
  username: cookery
  password: cookery

# Production credentials live outside source control.
# DB_HOST resolves to the postgres accessory hostname on the private
# Kamal network (e.g. "cookery_notes-db") and COOKERY_NOTES_DATABASE_PASSWORD
# is pulled from .kamal/secrets at deploy time.
production:
  primary: &primary_production
    <<: *default
    database: cookery_notes_production
    username: cookery_notes
    password: <%= ENV["COOKERY_NOTES_DATABASE_PASSWORD"] %>
    host: <%= ENV["DB_HOST"] %>
  cache:
    <<: *primary_production
    database: cookery_notes_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: cookery_notes_production_queue
    migrations_paths: db/queue_migrate
