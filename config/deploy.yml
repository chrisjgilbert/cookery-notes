# Name of your application. Used to uniquely configure containers.
service: cookery_notes

# Name of the container image.
image: your-user/cookery_notes

# Deploy to these servers.
servers:
  web:
    - 192.168.0.1
  # job:
  #   hosts:
  #     - 192.168.0.1
  #   cmd: bin/jobs

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# Remove this section when using multiple web servers and ensure you terminate SSL at your load balancer.
#
# Note: If using Cloudflare, set encryption mode to "Full (Strict)" to use Let's Encrypt certificate.
proxy:
  ssl: true
  host: app.example.com
  # kamal-proxy connects to the container on port 80 by default. Thruster
  # listens on 80 inside the container and forwards to puma on 3000, so we
  # leave app_port at the default.

# Credentials for your image host.
registry:
  # Specify the registry server, if you're not using Docker Hub
  # server: registry.digitalocean.com / ghcr.io / ...
  username: your-user

  # Always use an access token rather than real password (pulled from .kamal/secrets).
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - COOKERY_NOTES_DATABASE_PASSWORD
    - ANTHROPIC_API_KEY
  clear:
    # Run the Solid Queue Supervisor inside the web server's Puma process.
    SOLID_QUEUE_IN_PUMA: true
    # Hostname of the postgres accessory on the private Kamal network.
    # The accessory below is named "db", so its host is "<service>-db".
    DB_HOST: cookery_notes-db
    # Set number of processes dedicated to Solid Queue (default: 1).
    # JOB_CONCURRENCY: 3
    # Set number of cores available to the application on each server (default: 1).
    # WEB_CONCURRENCY: 2
    # Log everything from Rails.
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>". You can run any command by appending it (e.g., "bin/kamal logs -r job").
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64
  # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server
  # Pass arguments and secrets to the Docker build process
  # args:
  #   RUBY_VERSION: 3.3.6
  # secrets:
  #   - GITHUB_TOKEN

# Use a different ssh user than root
# ssh:
#   user: app

# Use accessory services (secrets come from .kamal/secrets).
accessories:
  db:
    image: postgres:16
    host: 192.168.0.1
    # Change to 5432 to expose postgres port to the world instead of just the local network.
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: cookery_notes
        POSTGRES_DB: cookery_notes_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
